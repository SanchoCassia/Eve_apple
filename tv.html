<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电视 · 李三秋</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, "Noto Sans SC", "PingFang SC", "Microsoft YaHei",
                 "Helvetica Neue", Arial, sans-serif;
    background: #faf8f5;
    color: #2c2c2c;
    line-height: 1.7;
  }

  /* ── Navigation bar ── */
  .top-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 820px;
    margin: 0 auto;
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid #ece7e0;
  }
  .top-nav .site-title {
    font-family: "Noto Serif SC", "STSong", serif;
    font-size: 1rem;
    letter-spacing: 4px;
    color: #1a1a1a;
    text-decoration: none;
  }
  .top-nav .site-title:hover { color: #b85a3a; }
  .top-nav .links {
    display: flex;
    gap: 1.5rem;
  }
  .top-nav .links a {
    text-decoration: none;
    color: #999;
    font-size: 0.8rem;
    letter-spacing: 2px;
    transition: color 0.2s;
  }
  .top-nav .links a:hover,
  .top-nav .links a.active {
    color: #b85a3a;
  }

  /* ── Page header ── */
  .page-header {
    max-width: 820px;
    margin: 0 auto;
    padding: 2rem 1.5rem 1rem;
  }
  .page-header h1 {
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: 6px;
    color: #1a1a1a;
  }
  .page-header .count {
    font-size: 0.8rem;
    color: #ccc;
    letter-spacing: 2px;
    margin-top: 0.2rem;
  }

  /* ── Content container ── */
  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 1.5rem 3rem;
  }

  /* ── Book / Film cards ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.2rem;
  }
  .card {
    background: #fff;
    border: 1px solid #ece7e0;
    border-radius: 6px;
    padding: 1.2rem 1.3rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    border-color: #d4c5b5;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .card .card-title {
    font-weight: 500;
    font-size: 0.95rem;
    letter-spacing: 1px;
  }
  .card .card-meta {
    font-size: 0.78rem;
    color: #aaa;
    margin-top: 0.3rem;
  }
  .card .card-desc {
    font-size: 0.83rem;
    color: #777;
    margin-top: 0.5rem;
    line-height: 1.6;
    cursor: pointer;
    transition: color 0.2s;
  }
  .card .card-desc.collapsed {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .card-desc:hover {
    color: #555;
  }
  .card .card-desc::after {
    content: '⋯ 展开';
    display: block;
    font-size: 0.7rem;
    color: #ccc;
    letter-spacing: 1px;
    margin-top: 0.2rem;
  }
  .card .card-desc.expanded::after {
    content: '△ 收起';
  }
  .card .card-rating {
    margin-top: 0.4rem;
    font-size: 0.8rem;
    color: #d4a017;
    letter-spacing: 1px;
  }
  .card .card-tags {
    margin-top: 0.4rem;
  }
  .card .card-tags .tag {
    display: inline-block;
    font-size: 0.68rem;
    padding: 0.05rem 0.5rem;
    border-radius: 8px;
    background: #f5f2ee;
    color: #999;
    margin-right: 0.3rem;
    margin-bottom: 0.2rem;
  }

  /* ── Empty state ── */
  .empty-state {
    color: #ccc;
    font-size: 0.9rem;
    font-style: italic;
    padding: 3rem 0;
    text-align: center;
    letter-spacing: 2px;
  }

  /* ── Section subtitle (for grouped categories) ── */
  .section-subtitle {
    font-size: 0.95rem;
    font-weight: 400;
    letter-spacing: 4px;
    color: #888;
    margin: 1.5rem 0 1rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid #ece7e0;
  }
  .section-subtitle:first-of-type {
    margin-top: 0;
  }
  .section-subtitle .badge {
    font-size: 0.7rem;
    color: #ccc;
    letter-spacing: 1px;
    margin-left: 0.5rem;
  }
  .card-grid + .section-subtitle {
    margin-top: 2rem;
  }

  /* ── Photo grid ── */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .photo-item {
    aspect-ratio: 1;
    border-radius: 4px;
    overflow: hidden;
    background: #f0ece6;
    position: relative;
  }
  .photo-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }
  .photo-item:hover img {
    transform: scale(1.03);
  }
  .photo-item .photo-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0.4rem 0.6rem;
    background: linear-gradient(transparent, rgba(0,0,0,0.4));
    color: #fff;
    font-size: 0.75rem;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .photo-item:hover .photo-label {
    opacity: 1;
  }
  .photo-empty {
    border: 2px dashed #e8e3dc;
    border-radius: 4px;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ddd;
    font-size: 0.8rem;
    letter-spacing: 1px;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 2rem 0;
    color: #ddd;
    font-size: 0.75rem;
    letter-spacing: 2px;
  }

  @media (max-width: 600px) {
    .top-nav { flex-direction: column; gap: 0.5rem; }
    .card-grid { grid-template-columns: 1fr; }
    .photo-grid { grid-template-columns: repeat(2, 1fr); }
    .page-header h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<div class="top-nav">
  <a class="site-title" href="index.html">李三秋</a>
  <div class="links">
    <a href="books.html" id="nav-books">书</a>
    <a href="films.html" id="nav-films">电影</a>
    <a href="tv.html" id="nav-tv">电视</a>
    <a href="photos.html" id="nav-photos">照片</a>
  </div>
</div>

<div class="page-header">
  <h1>📺 电视</h1>
  <div class="count">0 条</div>
</div>

<div class="container">
  <div class="empty-state">还没有记录。</div>
</div>

<div class="footer" id="footer"></div>
<script>
  document.getElementById('nav-tv')?.classList.add('active');
  fetch('../api/total')
    .then(r => r.json())
    .then(d => { if(d.total) document.getElementById('footer').textContent = '共 ' + d.total + ' 条记录' })
    .catch(() => {});

  // 点击描述展开/收起
  document.querySelectorAll('.card-desc').forEach(el => {
    el.classList.add('collapsed');
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      this.classList.toggle('collapsed');
      this.classList.toggle('expanded');
    });
  });
</script>
</body>
</html>
